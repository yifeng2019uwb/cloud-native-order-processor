apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: order-processor
  labels:
    app: order-processor
    component: gateway
    environment: gke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-processor
      component: gateway
  template:
    metadata:
      labels:
        app: order-processor
        component: gateway
        environment: gke
    spec:
      serviceAccountName: order-processor-sa
      containers:
      - name: gateway
        image: us-west1-docker.pkg.dev/ebpfagent/order-processor/gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        envFrom:
        - configMapRef:
            name: order-processor-config
        env:
        - name: GATEWAY_HOST
          value: "0.0.0.0"
        - name: GATEWAY_PORT
          value: "8080"
        - name: USER_SERVICE_URL
          value: "http://user-service:8000"
        - name: INVENTORY_SERVICE_URL
          value: "http://inventory-service:8001"
        - name: ORDER_SERVICE_URL
          value: "http://order-service:8002"
        - name: AUTH_SERVICE_URL
          value: "http://auth-service:8003"
        resources:
          requests:
            memory: "128Mi"
            cpu: "75m"
          limits:
            memory: "256Mi"
            cpu: "150m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: logs-volume
          mountPath: /app/logs
      volumes:
      - name: logs-volume
        emptyDir: {}
