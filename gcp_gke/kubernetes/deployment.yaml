apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: order-processor
  labels:
    app: order-processor
    component: auth-service
    environment: gke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-processor
      component: auth-service
  template:
    metadata:
      labels:
        app: order-processor
        component: auth-service
        environment: gke
    spec:
      serviceAccountName: order-processor-sa
      containers:
      - name: auth-service
        image: us-west1-docker.pkg.dev/ebpfagent/order-processor/auth-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8003
          name: http
        envFrom:
        - configMapRef:
            name: order-processor-config
        env:
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: jwt-secret
        - name: JWT_ALGORITHM
          value: "HS256"
        - name: JWT_EXPIRATION_MINUTES
          value: "60"
        resources:
          requests:
            memory: "128Mi"
            cpu: "75m"
          limits:
            memory: "256Mi"
            cpu: "150m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 5
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: logs-volume
          mountPath: /app/logs
      volumes:
      - name: logs-volume
        emptyDir: {}
