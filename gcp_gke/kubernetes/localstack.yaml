# LocalStack — DynamoDB emulation, same image/version as docker-compose.local.yml
# PERSISTENCE=1 with PVC matches docker-compose.local.yml (PERSISTENCE=1 + localstack_data volume)
# Init hook mirrors docker/deploy.sh init_local_dynamodb() — runs on every LocalStack start
apiVersion: v1
kind: ConfigMap
metadata:
  name: localstack-init
  namespace: order-processor
  labels:
    app: order-processor
    component: localstack
    environment: gke
data:
  init-tables.py: |
    import boto3

    client = boto3.client(
        'dynamodb',
        endpoint_url='http://localhost:4566',
        region_name='us-east-1',
        aws_access_key_id='test',
        aws_secret_access_key='test',
    )

    def create(name, args):
        try:
            client.create_table(**args)
            print(f'[init] {name}: created')
        except client.exceptions.ResourceInUseException:
            print(f'[init] {name}: already exists')

    create('users', {
        'TableName': 'order-processor-local-users',
        'AttributeDefinitions': [
            {'AttributeName': 'Pk',    'AttributeType': 'S'},
            {'AttributeName': 'Sk',    'AttributeType': 'S'},
            {'AttributeName': 'email', 'AttributeType': 'S'},
        ],
        'KeySchema': [
            {'AttributeName': 'Pk', 'KeyType': 'HASH'},
            {'AttributeName': 'Sk', 'KeyType': 'RANGE'},
        ],
        'BillingMode': 'PAY_PER_REQUEST',
        'GlobalSecondaryIndexes': [{
            'IndexName': 'EmailIndex',
            'KeySchema': [{'AttributeName': 'email', 'KeyType': 'HASH'}],
            'Projection': {'ProjectionType': 'ALL'},
        }],
    })

    create('orders', {
        'TableName': 'order-processor-local-orders',
        'AttributeDefinitions': [
            {'AttributeName': 'Pk',      'AttributeType': 'S'},
            {'AttributeName': 'Sk',      'AttributeType': 'S'},
            {'AttributeName': 'GSI-PK',  'AttributeType': 'S'},
            {'AttributeName': 'GSI-SK',  'AttributeType': 'S'},
            {'AttributeName': 'GSI2-PK', 'AttributeType': 'S'},
            {'AttributeName': 'GSI2-SK', 'AttributeType': 'N'},
        ],
        'KeySchema': [
            {'AttributeName': 'Pk', 'KeyType': 'HASH'},
            {'AttributeName': 'Sk', 'KeyType': 'RANGE'},
        ],
        'BillingMode': 'PAY_PER_REQUEST',
        'GlobalSecondaryIndexes': [
            {
                'IndexName': 'UserOrdersIndex',
                'KeySchema': [
                    {'AttributeName': 'GSI-PK', 'KeyType': 'HASH'},
                    {'AttributeName': 'GSI-SK', 'KeyType': 'RANGE'},
                ],
                'Projection': {'ProjectionType': 'ALL'},
            },
            {
                'IndexName': 'PendingLimitOrders',
                'KeySchema': [
                    {'AttributeName': 'GSI2-PK', 'KeyType': 'HASH'},
                    {'AttributeName': 'GSI2-SK', 'KeyType': 'RANGE'},
                ],
                'Projection': {'ProjectionType': 'ALL'},
            },
        ],
    })

    create('inventory', {
        'TableName': 'order-processor-local-inventory',
        'AttributeDefinitions': [
            {'AttributeName': 'product_id', 'AttributeType': 'S'},
            {'AttributeName': 'category',   'AttributeType': 'S'},
        ],
        'KeySchema': [
            {'AttributeName': 'product_id', 'KeyType': 'HASH'},
        ],
        'BillingMode': 'PAY_PER_REQUEST',
        'GlobalSecondaryIndexes': [{
            'IndexName': 'CategoryIndex',
            'KeySchema': [{'AttributeName': 'category', 'KeyType': 'HASH'}],
            'Projection': {'ProjectionType': 'ALL'},
        }],
    })

    print('[init] DynamoDB tables ready.')
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: localstack-data
  namespace: order-processor
  labels:
    app: order-processor
    component: localstack
    environment: gke
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
  namespace: order-processor
  labels:
    app: order-processor
    component: localstack
    environment: gke
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-processor
      component: localstack
  template:
    metadata:
      labels:
        app: order-processor
        component: localstack
        environment: gke
    spec:
      containers:
      - name: localstack
        image: localstack/localstack:3.8.1
        ports:
        - containerPort: 4566
          name: gateway
        env:
        - name: SERVICES
          value: "dynamodb"
        - name: DEBUG
          value: "0"
        - name: PERSISTENCE
          value: "1"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: localstack-data
          mountPath: /var/lib/localstack
        - name: localstack-init
          mountPath: /etc/localstack/init/ready.d
        readinessProbe:
          httpGet:
            path: /_localstack/health
            port: 4566
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 5
        livenessProbe:
          httpGet:
            path: /_localstack/health
            port: 4566
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
      volumes:
      - name: localstack-data
        persistentVolumeClaim:
          claimName: localstack-data
      - name: localstack-init
        configMap:
          name: localstack-init
          defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: localstack
  namespace: order-processor
  labels:
    app: order-processor
    component: localstack
    environment: gke
spec:
  type: ClusterIP
  selector:
    app: order-processor
    component: localstack
  ports:
  - name: gateway
    port: 4566
    targetPort: 4566
    protocol: TCP
