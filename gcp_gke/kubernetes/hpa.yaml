# HPA — scale on CPU for all 5 services
# Target: 70% of CPU request (75m) → scales up when avg CPU > ~52m per pod
# maxReplicas: 2 keeps total CPU requests within e2-standard-2 budget (2000m)
# GKE metrics-server is enabled by default — no extra setup needed
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-service-hpa
  namespace: order-processor
  labels:
    app: order-processor
    component: user-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
